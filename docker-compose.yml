version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: news_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-news_db}
      POSTGRES_USER: ${DB_USER:-news_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-news_user} -d ${DB_NAME:-news_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 뉴스 크롤러 ─────────────────────────────────────────────
  crawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_crawler
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - ./news_crawler.log:/app/news_crawler.log
    command: ["python", "run_scheduler.py", "--interval", "7"]

volumes:
  pgdata:
